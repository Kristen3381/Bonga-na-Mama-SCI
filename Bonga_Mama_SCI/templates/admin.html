<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>President's Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-10 font-sans">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold text-rose-900 underline decoration-rose-300">Presidential Inbox</h1>
            <a href="/" class="text-rose-600 font-bold">← Public Portal</a>
        </header>

        <div class="grid md:grid-cols-2 gap-8">
            <section class="bg-white p-6 rounded-3xl shadow-lg border-t-8 border-rose-400">
                <h2 class="text-xl font-bold text-rose-700 mb-4">Ladies' Lounge 🌸</h2>
                <div class="space-y-3">
                    {% for msg in storage.ladies %}
                    <div class="p-3 bg-rose-50 rounded-xl text-rose-900 border border-rose-100">{{ msg }}</div>
                    {% else %}<p class="italic text-gray-400">No messages yet.</p>{% endfor %}
                </div>
            </section>

            <section class="bg-white p-6 rounded-3xl shadow-lg border-t-8 border-blue-400">
                <h2 class="text-xl font-bold text-blue-700 mb-4">Gents' Hub 👔</h2>
                <div class="space-y-3">
                    {% for msg in storage.gents %}
                    <div class="p-3 bg-blue-50 rounded-xl text-blue-900 border border-blue-100">{{ msg }}</div>
                    {% else %}<p class="italic text-gray-400">No messages yet.</p>{% endfor %}
                </div>
            </section>
        </div>
    </div>
</body>
</html>
